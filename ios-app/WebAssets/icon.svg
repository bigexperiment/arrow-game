<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background: rich deep purple — makes all 4 colors pop -->
    <radialGradient id="bg" cx="50%" cy="44%" r="64%">
      <stop offset="0%"   stop-color="#4c1d95"/>
      <stop offset="55%"  stop-color="#1e0a3c"/>
      <stop offset="100%" stop-color="#07020f"/>
    </radialGradient>

    <!-- UP arm (GREEN): radial from arrow tip, bright lime → deep forest -->
    <radialGradient id="gUp" cx="50%" cy="6%" r="90%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ecfdb0"/>
      <stop offset="25%"  stop-color="#4ade80"/>
      <stop offset="72%"  stop-color="#15803d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </radialGradient>

    <!-- DOWN arm (RED): radial from tip at bottom -->
    <radialGradient id="gDown" cx="50%" cy="94%" r="90%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffe8e8"/>
      <stop offset="25%"  stop-color="#f87171"/>
      <stop offset="72%"  stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#3d0000"/>
    </radialGradient>

    <!-- RIGHT arm (YELLOW): radial from tip at right -->
    <radialGradient id="gRight" cx="94%" cy="50%" r="90%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fefce8"/>
      <stop offset="25%"  stop-color="#fbbf24"/>
      <stop offset="72%"  stop-color="#b45309"/>
      <stop offset="100%" stop-color="#3c1600"/>
    </radialGradient>

    <!-- LEFT arm (MINT): radial from tip at left -->
    <radialGradient id="gLeft" cx="6%" cy="50%" r="90%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#dcfce7"/>
      <stop offset="25%"  stop-color="#86efac"/>
      <stop offset="72%"  stop-color="#15803d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </radialGradient>

    <!-- Center medallion: gold -->
    <radialGradient id="gGold" cx="36%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#fefce8"/>
      <stop offset="28%"  stop-color="#fcd34d"/>
      <stop offset="65%"  stop-color="#d97706"/>
      <stop offset="100%" stop-color="#6b2d00"/>
    </radialGradient>

    <!-- Candy gloss (shared) -->
    <radialGradient id="gGloss" cx="28%" cy="16%" r="64%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.92"/>
      <stop offset="38%"  stop-color="#fff" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Rainbow border gradient -->
    <linearGradient id="gBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4ade80"/>
      <stop offset="30%"  stop-color="#fbbf24"/>
      <stop offset="65%"  stop-color="#f87171"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>

    <!-- Clip paths for candy gloss masking -->
    <clipPath id="cUp">
      <path d="M256,72 L200,200 L226,200 L226,278 L286,278 L286,200 L312,200 Z"/>
    </clipPath>
    <clipPath id="cDown">
      <path d="M256,440 L312,312 L286,312 L286,234 L226,234 L226,312 L200,312 Z"/>
    </clipPath>
    <clipPath id="cRight">
      <path d="M440,256 L312,200 L312,226 L234,226 L234,286 L312,286 L312,312 Z"/>
    </clipPath>
    <clipPath id="cLeft">
      <path d="M72,256 L200,200 L200,226 L278,226 L278,286 L200,286 L200,312 Z"/>
    </clipPath>
    <clipPath id="cGold">
      <circle cx="256" cy="256" r="62"/>
    </clipPath>

    <!-- Drop shadow for arms -->
    <filter id="fShad">
      <feDropShadow dx="3" dy="12" stdDeviation="11" flood-color="#000" flood-opacity="0.88"/>
    </filter>
    <!-- Softer shadow for center -->
    <filter id="fMed">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000" flood-opacity="0.70"/>
    </filter>
    <!-- Bloom glow -->
    <filter id="fBloom">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <!-- Faint depth rings -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- ── BLOOM HALOS (colored glow behind each arm) ── -->
  <path d="M256,72 L200,200 L226,200 L226,278 L286,278 L286,200 L312,200 Z"
        fill="#4ade80" opacity="0.28" filter="url(#fBloom)"/>
  <path d="M256,440 L312,312 L286,312 L286,234 L226,234 L226,312 L200,312 Z"
        fill="#f87171" opacity="0.28" filter="url(#fBloom)"/>
  <path d="M440,256 L312,200 L312,226 L234,226 L234,286 L312,286 L312,312 Z"
        fill="#fbbf24" opacity="0.28" filter="url(#fBloom)"/>
  <path d="M72,256 L200,200 L200,226 L278,226 L278,286 L200,286 L200,312 Z"
        fill="#86efac" opacity="0.28" filter="url(#fBloom)"/>
  <circle cx="256" cy="256" r="70" fill="#fcd34d" opacity="0.35" filter="url(#fBloom)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- EACH ARM: outline → color fill → gloss → specular → clean top outline → rim light -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- ── UP ↑ ARM (GREEN) ── -->
  <g filter="url(#fShad)">
    <path d="M256,72 L200,200 L226,200 L226,278 L286,278 L286,200 L312,200 Z"
          fill="#021509" stroke="#021509" stroke-width="28"
          stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M256,72 L200,200 L226,200 L226,278 L286,278 L286,200 L312,200 Z"
          fill="url(#gUp)"/>
  </g>
  <ellipse cx="234" cy="130" rx="70" ry="56" fill="url(#gGloss)" clip-path="url(#cUp)"/>
  <ellipse cx="216" cy="96"  rx="32" ry="23" fill="white" opacity="0.66" clip-path="url(#cUp)"/>
  <path d="M256,72 L200,200 L226,200 L226,278 L286,278 L286,200 L312,200 Z"
        fill="none" stroke="#021509" stroke-width="15"
        stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M256,72 L200,200" fill="none"
        stroke="rgba(255,255,255,0.62)" stroke-width="5" stroke-linecap="round"/>
  <line x1="226" y1="202" x2="226" y2="265"
        stroke="rgba(255,255,255,0.30)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── DOWN ↓ ARM (RED) ── -->
  <g filter="url(#fShad)">
    <path d="M256,440 L312,312 L286,312 L286,234 L226,234 L226,312 L200,312 Z"
          fill="#1a0000" stroke="#1a0000" stroke-width="28"
          stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M256,440 L312,312 L286,312 L286,234 L226,234 L226,312 L200,312 Z"
          fill="url(#gDown)"/>
  </g>
  <ellipse cx="276" cy="382" rx="70" ry="56" fill="url(#gGloss)" clip-path="url(#cDown)"/>
  <ellipse cx="292" cy="416" rx="32" ry="23" fill="white" opacity="0.60" clip-path="url(#cDown)"/>
  <path d="M256,440 L312,312 L286,312 L286,234 L226,234 L226,312 L200,312 Z"
        fill="none" stroke="#1a0000" stroke-width="15"
        stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M256,440 L312,312" fill="none"
        stroke="rgba(255,255,255,0.52)" stroke-width="5" stroke-linecap="round"/>
  <line x1="286" y1="310" x2="286" y2="248"
        stroke="rgba(255,255,255,0.28)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── RIGHT → ARM (YELLOW) ── -->
  <g filter="url(#fShad)">
    <path d="M440,256 L312,200 L312,226 L234,226 L234,286 L312,286 L312,312 Z"
          fill="#200a00" stroke="#200a00" stroke-width="28"
          stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M440,256 L312,200 L312,226 L234,226 L234,286 L312,286 L312,312 Z"
          fill="url(#gRight)"/>
  </g>
  <ellipse cx="382" cy="234" rx="56" ry="44" fill="url(#gGloss)" clip-path="url(#cRight)"/>
  <ellipse cx="410" cy="220" rx="25" ry="18" fill="white" opacity="0.64" clip-path="url(#cRight)"/>
  <path d="M440,256 L312,200 L312,226 L234,226 L234,286 L312,286 L312,312 Z"
        fill="none" stroke="#200a00" stroke-width="15"
        stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M440,256 L312,200" fill="none"
        stroke="rgba(255,255,255,0.58)" stroke-width="5" stroke-linecap="round"/>
  <line x1="312" y1="228" x2="248" y2="228"
        stroke="rgba(255,255,255,0.28)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── LEFT ← ARM (MINT) ── -->
  <g filter="url(#fShad)">
    <path d="M72,256 L200,200 L200,226 L278,226 L278,286 L200,286 L200,312 Z"
          fill="#021509" stroke="#021509" stroke-width="28"
          stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M72,256 L200,200 L200,226 L278,226 L278,286 L200,286 L200,312 Z"
          fill="url(#gLeft)"/>
  </g>
  <ellipse cx="130" cy="234" rx="56" ry="44" fill="url(#gGloss)" clip-path="url(#cLeft)"/>
  <ellipse cx="102" cy="220" rx="25" ry="18" fill="white" opacity="0.60" clip-path="url(#cLeft)"/>
  <path d="M72,256 L200,200 L200,226 L278,226 L278,286 L200,286 L200,312 Z"
        fill="none" stroke="#021509" stroke-width="15"
        stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M72,256 L200,200" fill="none"
        stroke="rgba(255,255,255,0.52)" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="228" x2="264" y2="228"
        stroke="rgba(255,255,255,0.28)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- CENTER GOLD MEDALLION (sits on top of all arms) -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g filter="url(#fMed)">
    <circle cx="256" cy="256" r="74" fill="#1a0800" stroke="#1a0800" stroke-width="11"/>
    <circle cx="256" cy="256" r="70" fill="url(#gGold)"/>
  </g>
  <!-- Medallion inner ring -->
  <circle cx="256" cy="256" r="56" fill="none"
          stroke="rgba(255,255,255,0.20)" stroke-width="2"/>
  <!-- Medallion gloss -->
  <ellipse cx="240" cy="236" rx="44" ry="32" fill="url(#gGloss)" clip-path="url(#cGold)"/>
  <!-- Medallion specular -->
  <ellipse cx="232" cy="228" rx="21" ry="14" fill="white" opacity="0.78" clip-path="url(#cGold)"/>
  <!-- Medallion top outline -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#1a0800" stroke-width="8"/>
  <!-- 4-pointed star in center -->
  <path d="M256,236 L260,249 L274,252 L260,255 L256,268 L252,255 L238,252 L252,249 Z"
        fill="rgba(255,255,255,0.82)"/>

  <!-- ── SPARKLE STARS ── -->
  <!-- Big white star: top-right -->
  <g transform="translate(408,68)">
    <path d="M0,-19 L3.7,-3.7 L19,0 L3.7,3.7 L0,19 L-3.7,3.7 L-19,0 L-3.7,-3.7 Z"
          fill="white" opacity="0.92"/>
  </g>
  <!-- Small white: upper-right edge -->
  <g transform="translate(452,124)">
    <path d="M0,-11 L2.2,-2.2 L11,0 L2.2,2.2 L0,11 L-2.2,2.2 L-11,0 L-2.2,-2.2 Z"
          fill="white" opacity="0.65"/>
  </g>
  <!-- Yellow star: top-left -->
  <g transform="translate(108,70)">
    <path d="M0,-15 L2.9,-2.9 L15,0 L2.9,2.9 L0,15 L-2.9,2.9 L-15,0 L-2.9,-2.9 Z"
          fill="#fef08a" opacity="0.88"/>
  </g>
  <!-- Mint: left side -->
  <g transform="translate(58,186)">
    <path d="M0,-9 L1.8,-1.8 L9,0 L1.8,1.8 L0,9 L-1.8,1.8 L-9,0 L-1.8,-1.8 Z"
          fill="#a7f3d0" opacity="0.66"/>
  </g>
  <!-- Red: bottom-right -->
  <g transform="translate(442,392)">
    <path d="M0,-9 L1.8,-1.8 L9,0 L1.8,1.8 L0,9 L-1.8,1.8 L-9,0 L-1.8,-1.8 Z"
          fill="#fca5a5" opacity="0.68"/>
  </g>

  <!-- ── BORDER: rainbow gradient ring ── -->
  <rect x="5" y="5" width="502" height="502" rx="111"
        fill="none" stroke="url(#gBorder)" stroke-width="6" opacity="0.70"/>
  <rect x="13" y="13" width="486" height="486" rx="105"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2.5"/>
</svg>
